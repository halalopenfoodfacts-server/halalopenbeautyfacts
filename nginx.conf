## ============================================================
## Halal Open Beauty Facts — nginx (container)
## Sécurité renforcée : headers, rate-limit, CORS restreint
## ============================================================

limit_req_zone $binary_remote_addr zone=api_beauty:10m    rate=30r/s;
limit_req_zone $binary_remote_addr zone=static_beauty:10m rate=60r/s;

server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    client_max_body_size  1m;
    client_body_timeout   10s;
    client_header_timeout 10s;
    keepalive_timeout     30s;

    if ($request_method !~ ^(GET|HEAD|OPTIONS)$) { return 405; }

    add_header X-Frame-Options           "DENY"                                always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://images.openbeautyfacts.org https://static.openbeautyfacts.org https://*.openbeautyfacts.org https://*.openfoodfacts.org https://*.openfoodfacts.net; connect-src 'self'; frame-src https://halal-open-food-facts.s2.yapla.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://halal-open-food-facts.s2.yapla.com; object-src 'none';" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 6;
    gzip_vary on;

    location ~* (\.env|\.git|\.htaccess|\.htpasswd|docker-compose|Makefile|composer\.(json|lock)|package(-lock)?\.json) {
        return 404;
    }
    location ~* /\. { return 404; }

    if ($http_user_agent ~* (sqlmap|nikto|nmap|masscan|zgrab|dirbuster|gobuster|wfuzz|hydra|nuclei)) {
        return 403;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
        limit_req zone=static_beauty burst=120 nodelay;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location ~* \.(css|js)$ {
        limit_req zone=static_beauty burst=120 nodelay;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        limit_req zone=static_beauty burst=80 nodelay;
        try_files $uri $uri/ /index.html;
    }

    location /proxy/v2/ {
        limit_req zone=api_beauty burst=60 nodelay;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass         http://django:8000/api/v2/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Portal          beauty;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        add_header Access-Control-Allow-Origin  "https://halalopenbeautyfacts.org" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS"                     always;
        add_header Access-Control-Allow-Headers "Content-Type"                     always;
        add_header Vary                         "Origin"                           always;
    }

    location /proxy/search/ {
        limit_req zone=api_beauty burst=60 nodelay;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass         http://django:8000/api/search/;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Portal        beauty;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_read_timeout 30s;
        add_header Access-Control-Allow-Origin  "https://halalopenbeautyfacts.org" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS"                     always;
        add_header Vary                         "Origin"                           always;
    }

    location /proxy/facets/ {
        limit_req zone=api_beauty burst=60 nodelay;
        if ($request_method = OPTIONS) { return 204; }
        proxy_pass         http://django:8000/api/facets/;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Portal        beauty;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_read_timeout 30s;
        add_header Access-Control-Allow-Origin  "https://halalopenbeautyfacts.org" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS"                     always;
        add_header Vary                         "Origin"                           always;
    }

    location /proxy/stats {
        limit_req zone=api_beauty burst=20 nodelay;
        proxy_pass         http://django:8000/api/stats?portal=beauty;
        proxy_set_header   Host $host;
        proxy_read_timeout 15s;
        add_header Access-Control-Allow-Origin "https://halalopenbeautyfacts.org" always;
        add_header Vary "Origin"                                                    always;
    }

    location /proxy/top {
        limit_req zone=api_beauty burst=20 nodelay;
        proxy_pass         http://django:8000/api/top?portal=beauty;
        proxy_set_header   Host $host;
        proxy_read_timeout 15s;
        add_header Access-Control-Allow-Origin "https://halalopenbeautyfacts.org" always;
        add_header Vary "Origin"                                                    always;
    }

    location /proxy/recent {
        limit_req zone=api_beauty burst=20 nodelay;
        proxy_pass         http://django:8000/api/recent?portal=beauty;
        proxy_set_header   Host $host;
        proxy_read_timeout 15s;
        add_header Access-Control-Allow-Origin "https://halalopenbeautyfacts.org" always;
        add_header Vary "Origin"                                                    always;
    }
}
