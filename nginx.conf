server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Activer la compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 6;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache pour les assets statiques
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy CORS — API v2 OpenBeautyFacts
    location /proxy/v2/ {
        proxy_pass https://world.openbeautyfacts.org/api/v2/;
        proxy_set_header Host world.openbeautyfacts.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        add_header Access-Control-Allow-Origin *;
    }

    # Proxy CORS — Search-a-licious (beauty)
    location /proxy/search/ {
        proxy_pass https://search.openbeautyfacts.org/;
        proxy_set_header Host search.openbeautyfacts.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        add_header Access-Control-Allow-Origin *;
    }

    # Proxy CORS — Facettes OpenBeautyFacts
    location /proxy/facets/ {
        proxy_pass https://world.openbeautyfacts.org/facets/;
        proxy_set_header Host world.openbeautyfacts.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        add_header Access-Control-Allow-Origin *;
    }
}
