version: '3.8'

# ─────────────────────────────────────────────────────────────────
#  Halal Open Beauty Facts — Stack complète (backend + frontend)
#  Copier .env.example → .env et remplir les valeurs avant de lancer
# ─────────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:16-alpine
    container_name: halal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-halaldb}
      POSTGRES_USER: ${POSTGRES_USER:-halal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - halal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-halal} -d ${POSTGRES_DB:-halaldb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: halal_redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - halal-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  django:
    build: ./backend
    container_name: halal_django
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - halal-network
    volumes:
      - static_files:/app/staticfiles
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  celery-worker:
    build: ./backend
    container_name: halal_celery_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    depends_on:
      - django
      - redis
    networks:
      - halal-network
    command: celery -A config worker --loglevel=info --concurrency=2

  celery-beat:
    build: ./backend
    container_name: halal_celery_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    depends_on:
      - django
      - redis
    networks:
      - halal-network
    command: >
      sh -c "python manage.py migrate django_celery_beat --noinput &&
             celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler"

  frontend:
    image: nginx:alpine
    container_name: halal_beauty_frontend
    ports:
      - "8080:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      - django
    networks:
      - halal-network

volumes:
  postgres_data:
  redis_data:
  static_files:

networks:
  halal-network:
    driver: bridge
