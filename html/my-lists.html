<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes listes — Halal Open Beauty Facts</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .lists-page { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .lists-page h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
        .lists-tabs { display: flex; gap: 0.5rem; margin: 1.5rem 0; flex-wrap: wrap; }
        .lists-tab { padding: 0.5rem 1.2rem; border-radius: 999px; border: 2px solid var(--border,#e5e7eb); background: #fff; cursor: pointer; font-weight: 600; font-size: 0.88rem; }
        .lists-tab.active { background: var(--primary,#16a34a); color: #fff; border-color: var(--primary,#16a34a); }
        .lists-panel { display: none; }
        .lists-panel.active { display: block; }
        .product-grid-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
        .list-product-card { background: #fff; border: 1px solid var(--border,#e5e7eb); border-radius: 12px; padding: 1rem; text-align: center; position: relative; }
        .list-product-card img { width: 70px; height: 70px; object-fit: contain; border-radius: 8px; margin-bottom: 0.5rem; }
        .list-product-card h4 { font-size: 0.85rem; margin: 0 0 0.25rem; }
        .list-product-card p { font-size: 0.75rem; color: #6b7280; margin: 0; }
        .list-product-card .btn-remove { position: absolute; top: 6px; right: 8px; background: none; border: none; cursor: pointer; font-size: 1rem; color: #9ca3af; }
        .list-product-card a { display: block; margin-top: 0.5rem; font-size: 0.8rem; color: var(--primary,#16a34a); text-decoration: none; }
        .list-empty { color: #9ca3af; text-align: center; padding: 2rem; }
        .list-actions-bar { display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
    </style>
</head>
<body>
    <header class="site-header site-header--secondary">
        <div class="site-header__inner">
            <a class="brand" href="index.html">
                <img src="assets/images/e.png" alt="Logo" class="brand__logo" style="height:32px">
                <div class="brand__text"><strong>Halal Open Beauty Facts</strong></div>
            </a>
            <nav class="primary-nav">
                <a href="index.html" class="ghost-btn">← Catalogue</a>
                <a href="dashboard.html" class="ghost-btn">📊 Mon profil</a>
            </nav>
        </div>
    </header>
    <main class="lists-page">
        <h1>📄 Mes listes</h1>
        <p style="color:#6b7280">Vos produits beauté favoris et listes personnalisées.</p>
        <div class="lists-tabs">
            <button class="lists-tab active" data-list="fav">⭐ Favoris</button>
            <button class="lists-tab" data-list="cart">🛒 Ma liste</button>
            <button class="lists-tab" data-list="black">🚫 Blacklist</button>
        </div>
        <div class="list-actions-bar">
            <button class="ghost-btn" onclick="exportList()">⬇️ Exporter JSON</button>
            <button class="ghost-btn" onclick="clearList()">🗑️ Vider cette liste</button>
        </div>
        <div id="list-content"></div>
    </main>
    <script>
    let activeList = 'fav';
    const PREFIX = 'beauty_list_';
    function getList(n) { try { return JSON.parse(localStorage.getItem(PREFIX+n)||'[]'); } catch { return []; } }
    function saveList(n,a) { localStorage.setItem(PREFIX+n, JSON.stringify(a)); }
    function render() {
        const items = getList(activeList);
        const el = document.getElementById('list-content');
        if (!items.length) { el.innerHTML = '<p class="list-empty">Cette liste est vide.</p>'; return; }
        el.innerHTML = `<div class="product-grid-list">${items.map(p => `
            <div class="list-product-card">
                <button class="btn-remove" onclick="removeItem('${p.code}')">✕</button>
                <img src="${p.img||'https://static.openfoodfacts.org/images/misc/product-default.png'}" alt="${p.name}">
                <h4>${p.name||'—'}</h4>
                <p>${p.brand||''}</p>
                <a href="product.html?code=${p.code}">Voir la fiche →</a>
            </div>`).join('')}</div>`;
    }
    function removeItem(code) {
        let arr = getList(activeList).filter(p => p.code !== code);
        saveList(activeList, arr); render();
    }
    function exportList() {
        const data = JSON.stringify(getList(activeList), null, 2);
        const a = document.createElement('a');
        a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(data);
        a.download = `liste-beaute-${activeList}.json`; a.click();
    }
    function clearList() {
        if (confirm('Vider cette liste ?')) { saveList(activeList, []); render(); }
    }
    document.querySelectorAll('.lists-tab').forEach(t => {
        t.addEventListener('click', () => {
            document.querySelectorAll('.lists-tab').forEach(x => x.classList.remove('active'));
            t.classList.add('active');
            activeList = t.dataset.list;
            render();
        });
    });
    render();
    </script>
</body>
</html>
