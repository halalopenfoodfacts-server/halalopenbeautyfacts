server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 6;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Proxy vers Django Backend ──

    location /proxy/v2/ {
        proxy_pass http://django:8000/api/v2/;
        proxy_set_header Host $host;
        proxy_set_header X-Portal beauty;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin "*";
    }

    location /proxy/search/ {
        proxy_pass http://django:8000/api/search/;
        proxy_set_header Host $host;
        proxy_set_header X-Portal beauty;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin "*";
    }

    location /proxy/facets/ {
        proxy_pass http://django:8000/api/facets/;
        proxy_set_header Host $host;
        proxy_set_header X-Portal beauty;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin "*";
    }

    location /proxy/stats {
        proxy_pass http://django:8000/api/stats?portal=beauty;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*";
    }

    location /proxy/top {
        proxy_pass http://django:8000/api/top?portal=beauty;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*";
    }

    location /proxy/recent {
        proxy_pass http://django:8000/api/recent?portal=beauty;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*";
    }
}
